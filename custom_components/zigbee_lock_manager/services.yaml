set_code:
  fields:
    entity_id:
      required: true
      selector:
        entity:
          domain: lock
    slot:
      required: true
      selector:
        number:
          min: 1
          max: 250
          mode: box
    name:
      required: true
      selector:
        text:
    code:
      required: true
      selector:
        text:
          type: password
    labels:
      required: false
      selector:
        object:
    enabled:
      required: false
      default: true
      selector:
        boolean:
    starts_at:
      required: false
      selector:
        datetime:
    expires_at:
      required: false
      selector:
        datetime:
    schedule:
      required: false
      selector:
        object:
    notes:
      required: false
      selector:
        text:

